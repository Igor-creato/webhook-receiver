services:
  app-receiver:
    build: .
    image: app-custom:latest
    container_name: webhook-receiver
    restart: unless-stopped
    mem_limit: 384m
    mem_reservation: 96m
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    environment:
      - REDIS_URL=redis://redis:6379/1
      - CONFIG_PATH=/data/config.json
      - WEBHOOK_DOMAIN=${WEBHOOK_DOMAIN}
      - TZ=UTC
    volumes:
      - app_data:/data
    # --no-access-log: webhook URL contains a secret token in the path; access log would leak it.
    command: python -m uvicorn app.receiver:app --host 0.0.0.0 --port 8099 --workers 2 --log-level warning --no-access-log
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.webhook.entrypoints=websecure
      - traefik.http.routers.webhook.rule=Host(`${WEBHOOK_DOMAIN}`)
      - traefik.http.routers.webhook.tls=true
      - traefik.http.routers.webhook.tls.certresolver=letsencrypt
      - traefik.http.routers.webhook.service=webhook-svc
      - traefik.http.services.webhook-svc.loadbalancer.server.port=8099
    networks:
      - proxy
      - internal
      - db-shared
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:8099/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  app-admin:
    image: app-custom:latest
    container_name: webhook-admin
    restart: unless-stopped
    mem_limit: 192m
    mem_reservation: 32m
    depends_on:
      app-receiver:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    ports:
      - '127.0.0.1:8098:8098' # Admin UI (localhost only via SSH)
    environment:
      - REDIS_URL=redis://redis:6379/1
      - CONFIG_PATH=/data/config.json
      - ADMIN_SECRET=${ADMIN_SECRET:?ADMIN_SECRET must be set in .env (run install.sh to generate)}
      - WEBHOOK_DOMAIN=${WEBHOOK_DOMAIN}
      - TZ=UTC
    volumes:
      - app_data:/data
    command: python -m uvicorn admin.panel:app --host 0.0.0.0 --port 8098 --workers 1 --log-level info
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:8098/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal
      - db-shared

  worker:
    image: app-custom:latest
    container_name: webhook-worker
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 128m
    depends_on:
      app-receiver:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    environment:
      - REDIS_URL=redis://redis:6379/1
      - CONFIG_PATH=/data/config.json
      - WORKER_CONCURRENCY=4
      - TZ=UTC
    env_file:
      # SMTP settings + DOMAIN (shared with WordPress site)
      - path: ${SMTP_ENV_FILE:-/home/igor/site/.env}
        required: false
    volumes:
      - app_data:/data
    command: python -m worker.processor
    stop_grace_period: 30s
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:9100/metrics || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - db-shared
      - internal
networks:
  proxy:
    external: true
  db-shared:
    external: true
  internal:
    driver: bridge

volumes:
  app_data:
