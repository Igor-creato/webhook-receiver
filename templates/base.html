<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Webhook Receiver{% endblock %}</title>
    <style>
        :root {
            --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
            --text: #e1e4ed; --muted: #8b8fa3; --accent: #6366f1;
            --accent-hover: #818cf8; --green: #22c55e; --red: #ef4444;
            --orange: #f59e0b; --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }

        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; flex-shrink: 0; }
        .sidebar h2 { padding: 0 20px 20px; font-size: 15px; color: var(--accent); border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .sidebar a { display: block; padding: 10px 20px; color: var(--muted); font-size: 14px; transition: .15s; }
        .sidebar a:hover, .sidebar a.active { color: var(--text); background: rgba(99,102,241,.1); }
        .sidebar a.active { border-left: 3px solid var(--accent); }

        .main { flex: 1; padding: 30px 40px; max-width: 1100px; }
        h1 { font-size: 22px; margin-bottom: 25px; }
        h3 { font-size: 16px; margin: 20px 0 10px; color: var(--muted); }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
        .card-title { font-size: 14px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }

        .form-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
        .form-row label { min-width: 140px; font-size: 14px; color: var(--muted); }
        input[type="text"], input[type="password"], input[type="number"], select {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 8px 12px; border-radius: 6px; font-size: 14px; width: 100%; max-width: 400px;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent); }

        .btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: .15s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger { background: var(--red); color: white; }
        .btn-danger:hover { opacity: .85; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-secondary:hover { background: #3a3d4a; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn-green { background: var(--green); color: white; }

        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .badge-green { background: rgba(34,197,94,.15); color: var(--green); }
        .badge-red { background: rgba(239,68,68,.15); color: var(--red); }
        .badge-orange { background: rgba(245,158,11,.15); color: var(--orange); }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 10px 12px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 12px; text-transform: uppercase; }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
        tr:hover td { background: rgba(99,102,241,.04); }

        .url-box { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-family: monospace; font-size: 13px; word-break: break-all; color: var(--green); margin: 8px 0; }

        .mapping-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .mapping-row input { flex: 1; max-width: 200px; }
        .mapping-row .eq { color: var(--muted); font-weight: bold; min-width: 20px; text-align: center; }
        .mapping-row .del-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 18px; padding: 4px 8px; }
        .mapping-row .del-btn:hover { opacity: .7; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

        .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
        .alert-success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: var(--green); }
        .alert-error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: var(--red); }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .mt-2 { margin-top: 16px; }
        .mb-1 { margin-bottom: 8px; }
        .text-muted { color: var(--muted); font-size: 13px; }
    </style>
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <h2>🔗 Webhook Receiver</h2>
            <a href="/dashboard" {% if active == 'dashboard' %}class="active"{% endif %}>📊 Дашборд</a>
            <a href="/db-settings" {% if active == 'db' %}class="active"{% endif %}>🗄️ База данных</a>
            <a href="/networks" {% if active == 'networks' %}class="active"{% endif %}>🌐 Сети</a>
            <a href="/logs" {% if active == 'logs' %}class="active"{% endif %}>📋 Логи</a>
            <a href="/logout" style="margin-top: auto; color: var(--red);">⏏ Выход</a>
        </nav>
        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
